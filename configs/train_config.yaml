training:
  batch_size: 64
  num_epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  warmup_epochs: 5
  scheduler: cosine
  patience: 15
  save_every: 5

  loss_weights:
    emotion: 1.0
    speaker: 0.8
    age_reg: 0.3
    age_cls: 0.3
    gender: 0.5

  augment_prob: 0.5

data:
  target_length: 300
  sample_rate: 16000
  n_mels: 80
